<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zrnge</title>
<meta name="description" content="Zrnge — projects and code." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">

<style>
:root{
  /* Claude palette */
  --bg:#faf9f5;
  --surface:#ffffff;
  --surface-2:#f4f3ee;
  --border:#e8e6dc;
  --border-strong:#d9d6c7;
  --text:#1f1e1d;
  --text-muted:#5a5856;
  --text-soft:#8b8a86;
  --accent:#cc785c;
  --accent-hover:#b86948;
  --accent-soft:#f3ddd2;
  --accent-faint:#fbf2ed;
  --radius:10px;
  --radius-sm:6px;
  --sans:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --serif:'Source Serif 4', Georgia, serif;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px}

.nav{
  border-bottom:1px solid var(--border);
  padding:18px 0;
  background:rgba(250,249,245,0.85);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:50;
}
.nav-inner{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
.brand-mark{
  width:28px;height:28px;border-radius:6px;
  background:var(--accent);color:white;
  display:grid;place-items:center;
  font-weight:600;font-size:14px;
  font-family:var(--serif);
}
.brand-text span{color:var(--text-soft);font-weight:400}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{
  font-size:14px;color:var(--text-muted);
  padding:7px 12px;border-radius:6px;
  transition:.15s;
}
.nav-links a:hover{color:var(--text);background:var(--surface-2)}

.hero{padding:72px 0 48px}
.hero h1{
  font-family:var(--serif);
  font-weight:500;
  font-size:clamp(36px, 5.5vw, 56px);
  line-height:1.1;
  letter-spacing:-0.02em;
  margin-bottom:20px;
  max-width:720px;
}
.hero h1 em{
  font-style:italic;
  color:var(--accent);
  font-weight:500;
}
.hero-sub{
  font-size:17px;
  color:var(--text-muted);
  max-width:580px;
  line-height:1.6;
  margin-bottom:28px;
}
.hero-meta{
  display:flex;flex-wrap:wrap;gap:24px;
  font-size:13px;color:var(--text-soft);
}
.hero-meta b{color:var(--text);font-weight:600}

.section{padding:24px 0 80px}
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:24px;gap:16px;flex-wrap:wrap;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.section-head h2{
  font-family:var(--serif);
  font-size:24px;
  font-weight:500;
  letter-spacing:-0.01em;
}
.section-count{
  font-size:13px;color:var(--text-soft);
  font-variant-numeric:tabular-nums;
}
.section-count b{color:var(--text);font-weight:600}

.controls{
  display:flex;gap:10px;margin-bottom:24px;
  align-items:center;flex-wrap:wrap;
}
.search{flex:1;min-width:220px;position:relative}
.search input{
  width:100%;background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);font-family:var(--sans);font-size:14px;
  padding:10px 14px 10px 38px;
  border-radius:var(--radius-sm);
  transition:.15s;
}
.search input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.search input::placeholder{color:var(--text-soft)}
.search svg{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-soft);
}
.filters{display:flex;gap:4px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:3px;
}
.chip{
  font-size:13px;padding:6px 12px;border-radius:4px;
  background:transparent;border:none;
  color:var(--text-muted);cursor:pointer;transition:.15s;
  font-weight:500;
}
.chip:hover{color:var(--text)}
.chip.active{background:var(--surface-2);color:var(--text)}
.sort-select{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-muted);font-family:var(--sans);font-size:13px;
  padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;
  font-weight:500;
}
.sort-select:focus{outline:none;border-color:var(--accent)}

.repo-list{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.repo{
  display:flex;align-items:center;gap:20px;
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.repo:last-child{border-bottom:none}
.repo:hover{background:var(--accent-faint)}

.repo-main{flex:1;min-width:0}
.repo-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.repo-name{
  font-size:16px;font-weight:600;
  color:var(--text);
  letter-spacing:-0.005em;
}
.repo-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;
  color:var(--accent);
  background:var(--accent-soft);
  padding:2px 8px;border-radius:999px;
  letter-spacing:.02em;
}
.repo-badge .pulse{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.repo-desc{
  font-size:14px;color:var(--text-muted);
  line-height:1.5;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.repo-desc.empty{font-style:italic;color:var(--text-soft)}
.repo-meta{
  display:flex;align-items:center;gap:16px;
  font-size:12px;color:var(--text-soft);
  flex-wrap:wrap;
}
.repo-meta span{display:inline-flex;align-items:center;gap:4px}
.lang-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.repo-actions{display:flex;gap:8px;flex-shrink:0}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:var(--sans);font-size:13px;font-weight:500;
  cursor:pointer;transition:.15s;border:1px solid;
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{
  background:var(--surface);color:var(--text);
  border-color:var(--border-strong);
}
.btn-secondary:hover{background:var(--surface-2);border-color:var(--text-soft)}
.btn svg{width:13px;height:13px}

.pagination{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:24px;flex-wrap:wrap;gap:16px;
}
.pagination-info{
  font-size:13px;color:var(--text-soft);
  font-variant-numeric:tabular-nums;
}
.pagination-info b{color:var(--text);font-weight:600}
.pagination-controls{display:flex;gap:4px;align-items:center}
.page-btn{
  min-width:34px;height:34px;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-muted);
  font-size:13px;font-weight:500;
  border-radius:var(--radius-sm);cursor:pointer;
  transition:.15s;padding:0 10px;
}
.page-btn:hover:not(:disabled){
  color:var(--text);border-color:var(--border-strong);
  background:var(--surface-2);
}
.page-btn.active{
  background:var(--accent);color:white;
  border-color:var(--accent);
}
.page-btn.active:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-ellipsis{color:var(--text-soft);padding:0 4px;font-size:13px}

.state{
  text-align:center;padding:60px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.state h3{
  font-family:var(--serif);font-size:20px;font-weight:500;
  color:var(--text);margin-bottom:8px;
}
.state p{font-size:14px;color:var(--text-muted);max-width:400px;margin:0 auto}
.state a{color:var(--accent);font-weight:500}

.skel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.skel-row{
  height:90px;border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.skel-row:last-child{border-bottom:none}
.skel-row::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(204,120,92,.06),transparent);
  animation:shimmer 1.6s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.footer{
  border-top:1px solid var(--border);
  padding:32px 0;
  font-size:13px;color:var(--text-soft);
}
.footer-inner{
  display:flex;justify-content:space-between;align-items:center;
  gap:16px;flex-wrap:wrap;
}
.footer a{color:var(--text-muted);transition:.15s}
.footer a:hover{color:var(--accent)}
.footer-links{display:flex;gap:18px}

.repo{animation:fadeIn .25s ease backwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

@media (max-width:680px){
  .repo{flex-direction:column;align-items:flex-start;gap:14px;padding:18px}
  .repo-actions{width:100%}
  .repo-actions .btn{flex:1}
  .hero{padding:48px 0 32px}
  .pagination{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="#" class="brand" onclick="window.scrollTo({top:0,behavior:'smooth'});return false">
      <div class="brand-mark">Z</div>
      <div class="brand-text">zrnge<span>.github.io</span></div>
    </a>
    <div class="nav-links">
      <a href="#projects">Projects</a>
      <a href="https://github.com/Zrnge" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <h1>Hi, I'm Zrnge — I <em>build things</em> for the web.</h1>
    <p class="hero-sub">
      A collection of projects, experiments, and tools. Live demos open the deployed page; everything else links to source.
    </p>
    <div class="hero-meta">
      <span><b id="metaRepos">—</b> public repos</span>
      <span><b id="metaLive">—</b> live demos</span>
      <span><b id="metaStars">—</b> total stars</span>
    </div>
  </div>
</header>

<section class="section" id="projects">
  <div class="wrap">
    <div class="section-head">
      <h2>Projects</h2>
      <div class="section-count" id="resultCount"></div>
    </div>

    <div class="controls">
      <div class="search">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search projects..." />
      </div>
      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="live">Live</button>
        <button class="chip" data-filter="source">Source</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="stars">Most stars</option>
        <option value="updated">Recently updated</option>
        <option value="name">Name (A–Z)</option>
        <option value="created">Newest</option>
      </select>
    </div>

    <div id="repoContainer">
      <div class="skel">
        <div class="skel-row"></div><div class="skel-row"></div>
        <div class="skel-row"></div><div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </div>

    <div id="paginationContainer"></div>
  </div>
</section>

<footer class="footer">
  <div class="wrap footer-inner">
    <div>© <span id="year"></span> Zrnge</div>
    <div class="footer-links">
      <a href="https://github.com/Zrnge" target="_blank" rel="noopener">GitHub</a>
      <a href="#projects">Projects</a>
      <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false">Top ↑</a>
    </div>
  </div>
</footer>

<script>
const USERNAME = 'Zrnge';
const API = `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`;
const PER_PAGE = 10;

const LANG_COLORS = {
  JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5', HTML:'#e34c26',
  CSS:'#563d7c', Java:'#b07219', 'C++':'#f34b7d', C:'#555555', 'C#':'#178600',
  Go:'#00ADD8', Rust:'#dea584', Ruby:'#701516', PHP:'#4F5D95', Swift:'#F05138',
  Kotlin:'#A97BFF', Dart:'#00B4AB', Shell:'#89e051', Vue:'#41b883', Svelte:'#ff3e00',
  Astro:'#ff5d01', Lua:'#000080', R:'#198CE7', Scala:'#c22d40',
};

let allRepos = [];
let filteredRepos = [];
let currentFilter = 'all';
let currentSort = 'stars';
let currentSearch = '';
let currentPage = 1;

const $ = (s) => document.querySelector(s);
const container = $('#repoContainer');
const paginationContainer = $('#paginationContainer');

document.getElementById('year').textContent = new Date().getFullYear();

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeAgo(date){
  const s = Math.floor((Date.now() - new Date(date)) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60); if (h < 24) return `${h}h ago`;
  const d = Math.floor(h/24); if (d < 30) return `${d}d ago`;
  const mo = Math.floor(d/30); if (mo < 12) return `${mo}mo ago`;
  return `${Math.floor(mo/12)}y ago`;
}

function getPagesUrl(repo){
  if (repo.name.toLowerCase() === `${USERNAME.toLowerCase()}.github.io`){
    return `https://${USERNAME.toLowerCase()}.github.io`;
  }
  if (repo.homepage && /^https?:\/\//i.test(repo.homepage)){
    return repo.homepage;
  }
  if (repo.has_pages){
    return `https://${USERNAME.toLowerCase()}.github.io/${repo.name}`;
  }
  return null;
}

function applyFilters(){
  let list = [...allRepos];

  if (currentFilter === 'live') list = list.filter(r => getPagesUrl(r));
  else if (currentFilter === 'source') list = list.filter(r => !getPagesUrl(r));

  if (currentSearch){
    const q = currentSearch.toLowerCase();
    list = list.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.description||'').toLowerCase().includes(q) ||
      (r.language||'').toLowerCase().includes(q) ||
      (r.topics||[]).some(t => t.includes(q))
    );
  }

  list.sort((a,b) => {
    if (currentSort === 'stars'){
      // primary: stars desc, tiebreaker: most recently updated
      if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
      return new Date(b.updated_at) - new Date(a.updated_at);
    }
    if (currentSort === 'name')  return a.name.localeCompare(b.name);
    if (currentSort === 'created') return new Date(b.created_at) - new Date(a.created_at);
    return new Date(b.updated_at) - new Date(a.updated_at);
  });

  filteredRepos = list;
  currentPage = 1;
  renderPage();
}

function renderPage(){
  const total = filteredRepos.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PER_PAGE;
  const slice = filteredRepos.slice(start, start + PER_PAGE);

  if (total === 0){
    $('#resultCount').innerHTML = '';
  } else {
    const end = Math.min(start + PER_PAGE, total);
    $('#resultCount').innerHTML = `Showing <b>${start + 1}–${end}</b> of <b>${total}</b>`;
  }

  if (total === 0){
    container.innerHTML = `
      <div class="state">
        <h3>No projects found</h3>
        <p>Try clearing your search or switching filters.</p>
      </div>`;
    paginationContainer.innerHTML = '';
    return;
  }

  const list = document.createElement('div');
  list.className = 'repo-list';

  slice.forEach((repo, i) => {
    const pages = getPagesUrl(repo);
    const langColor = LANG_COLORS[repo.language] || '#cc785c';

    const repoEl = document.createElement('article');
    repoEl.className = 'repo';
    repoEl.style.animationDelay = `${i * 20}ms`;

    const desc = repo.description
      ? `<p class="repo-desc">${escapeHtml(repo.description)}</p>`
      : `<p class="repo-desc empty">No description provided.</p>`;

    const meta = `
      <div class="repo-meta">
        ${repo.language ? `<span><i class="lang-dot" style="background:${langColor}"></i>${escapeHtml(repo.language)}</span>` : ''}
        ${repo.stargazers_count > 0 ? `<span>★ ${repo.stargazers_count}</span>` : ''}
        ${repo.forks_count > 0 ? `<span>⑂ ${repo.forks_count}</span>` : ''}
        <span>Updated ${timeAgo(repo.updated_at)}</span>
      </div>`;

    let actions;
    if (pages){
      actions = `
        <div class="repo-actions">
          <a class="btn btn-primary" href="${escapeHtml(pages)}" target="_blank" rel="noopener">
            Try Now
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
          <a class="btn btn-secondary" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noopener">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
            Repo
          </a>
        </div>`;
    } else {
      actions = `
        <div class="repo-actions">
          <a class="btn btn-secondary" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noopener">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
            View Repository
          </a>
        </div>`;
    }

    repoEl.innerHTML = `
      <div class="repo-main">
        <div class="repo-head">
          <span class="repo-name">${escapeHtml(repo.name)}</span>
          ${pages ? `<span class="repo-badge"><span class="pulse"></span>Live</span>` : ''}
          ${repo.fork ? `<span class="repo-badge" style="color:var(--text-soft);background:var(--surface-2)">Fork</span>` : ''}
          ${repo.archived ? `<span class="repo-badge" style="color:var(--text-soft);background:var(--surface-2)">Archived</span>` : ''}
        </div>
        ${desc}
        ${meta}
      </div>
      ${actions}
    `;
    list.appendChild(repoEl);
  });

  container.innerHTML = '';
  container.appendChild(list);

  renderPagination(totalPages);
}

function renderPagination(totalPages){
  if (totalPages <= 1){ paginationContainer.innerHTML = ''; return; }

  const pages = [];
  const window = 1;
  for (let i = 1; i <= totalPages; i++){
    if (i === 1 || i === totalPages || (i >= currentPage - window && i <= currentPage + window)){
      pages.push(i);
    } else if (pages[pages.length - 1] !== '…'){
      pages.push('…');
    }
  }

  const pageButtons = pages.map(p => {
    if (p === '…') return `<span class="page-ellipsis">…</span>`;
    return `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }).join('');

  paginationContainer.innerHTML = `
    <div class="pagination">
      <div class="pagination-info">
        Page <b>${currentPage}</b> of <b>${totalPages}</b>
      </div>
      <div class="pagination-controls">
        <button class="page-btn" data-page="prev" ${currentPage === 1 ? 'disabled' : ''} aria-label="Previous">←</button>
        ${pageButtons}
        <button class="page-btn" data-page="next" ${currentPage === totalPages ? 'disabled' : ''} aria-label="Next">→</button>
      </div>
    </div>
  `;

  paginationContainer.querySelectorAll('.page-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.page;
      if (v === 'prev' && currentPage > 1) currentPage--;
      else if (v === 'next' && currentPage < totalPages) currentPage++;
      else if (!isNaN(parseInt(v))) currentPage = parseInt(v);
      renderPage();
      document.getElementById('projects').scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
}

function updateStats(){
  const live = allRepos.filter(r => getPagesUrl(r)).length;
  const stars = allRepos.reduce((s,r) => s + r.stargazers_count, 0);
  $('#metaRepos').textContent = allRepos.length;
  $('#metaLive').textContent = live;
  $('#metaStars').textContent = stars;
}

async function loadRepos(){
  try {
    console.log(`[zrnge.github.io] Fetching repos from: ${API}`);
    const res = await fetch(API);
    console.log(`[zrnge.github.io] Response status: ${res.status}`);

    if (!res.ok){
      if (res.status === 404) throw new Error(`User "${USERNAME}" not found on GitHub. Check the username spelling.`);
      if (res.status === 403){
        const remaining = res.headers.get('x-ratelimit-remaining');
        if (remaining === '0'){
          const reset = res.headers.get('x-ratelimit-reset');
          const minutes = reset ? Math.ceil((parseInt(reset) * 1000 - Date.now()) / 60000) : '?';
          throw new Error(`GitHub API rate limit reached (60/hour for unauthenticated requests). Resets in ~${minutes} minute(s).`);
        }
        throw new Error('GitHub API access forbidden (403).');
      }
      throw new Error(`GitHub API error (${res.status} ${res.statusText})`);
    }

    const repos = await res.json();
    console.log(`[zrnge.github.io] Loaded ${repos.length} repos`);

    if (!Array.isArray(repos)){
      throw new Error('Unexpected API response format.');
    }
    if (repos.length === 0){
      container.innerHTML = `
        <div class="state">
          <h3>No public repositories yet</h3>
          <p>This GitHub account doesn't have any public repos to show. Visit <a href="https://github.com/${USERNAME}" target="_blank" rel="noopener">github.com/${USERNAME}</a>.</p>
        </div>`;
      paginationContainer.innerHTML = '';
      return;
    }

    allRepos = repos.filter(r => !r.private);
    updateStats();
    applyFilters();
  } catch (err){
    console.error('[zrnge.github.io] Failed to load repos:', err);
    container.innerHTML = `
      <div class="state">
        <h3>Couldn't load repositories</h3>
        <p style="margin-bottom:12px">${escapeHtml(err.message)}</p>
        <p style="font-size:12px;color:var(--text-soft)">Open your browser's developer console (F12) for more details, or visit <a href="https://github.com/${USERNAME}" target="_blank" rel="noopener">github.com/${USERNAME}</a> directly.</p>
      </div>`;
    paginationContainer.innerHTML = '';
  }
}

$('#searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  applyFilters();
});
$('#sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  applyFilters();
});
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.filter;
    applyFilters();
  });
});

loadRepos();
</script>
